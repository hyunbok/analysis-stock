name: Server CI

on:
  push:
    branches: [main, develop]
    paths: ['server/**']
  pull_request:
    branches: [main, develop]
    paths: ['server/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install ruff
      - run: ruff check server/app/ server/tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r server/requirements.txt mypy pydantic
      - run: cd server && mypy app/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cointrader
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cointrader_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: cointrader
          MONGO_INITDB_ROOT_PASSWORD: testpassword
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://cointrader:testpassword@localhost:5432/cointrader_test
      MONGODB_URL: mongodb://cointrader:testpassword@localhost:27017/cointrader_test?authSource=admin
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r server/requirements.txt && pip install pytest pytest-asyncio pytest-cov httpx
      - run: cd server && pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage.xml
