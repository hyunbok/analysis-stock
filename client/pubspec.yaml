name: coin_trader
description: CoinTrader - Real-time cryptocurrency trading app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.4.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  go_router: ^14.0.0
  fl_chart: ^0.69.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  flutter_secure_storage: ^9.2.0
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

